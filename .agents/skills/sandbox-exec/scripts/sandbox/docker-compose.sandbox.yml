# Sandbox Exec — Docker Compose Configuration
# Usage: docker compose -f .agents/skills/sandbox-exec/scripts/sandbox/docker-compose.sandbox.yml run --rm sandbox <command>
#
# Security levels:
#   full-isolation  — network_mode: none, read-only rootfs (default)
#   restricted-net  — custom network, allowlisted outbound only
#   dev             — unrestricted (for development speed)

services:
  # === Full isolation (default) ===
  sandbox:
    build:
      context: .
      dockerfile: .agents/skills/sandbox-exec/scripts/sandbox/Dockerfile
    image: sandbox-exec:latest
    container_name: sandbox-exec-${TASK_ID:-default}
    network_mode: "none"
    volumes:
      - type: bind
        source: ./
        target: /workspace
        read_only: false
    tmpfs:
      - /tmp:size=512M
    environment:
      - TASK_ID=${TASK_ID:-default}
      - NODE_ENV=test
      - HOME=/home/agent
    working_dir: /workspace
    user: agent
    init: true
    stop_timeout: 30
    mem_limit: 1g
    pids_limit: 100
    # Command allowlist enforcement (entrypoint wrapper)
    entrypoint:
      - /workspace/.agents/skills/sandbox-exec/scripts/sandbox/entrypoint.sh
    command: ["bash"]

  # === Restricted network (allowlisted outbound only) ===
  sandbox-restricted:
    build:
      context: .
      dockerfile: .agents/skills/sandbox-exec/scripts/sandbox/Dockerfile
    image: sandbox-exec:latest
    container_name: sandbox-exec-${TASK_ID:-restricted}
    networks:
      - sandbox-net
    volumes:
      - type: bind
        source: ./
        target: /workspace
        read_only: false
    tmpfs:
      - /tmp:size=512M
    environment:
      - TASK_ID=${TASK_ID:-restricted}
      - NODE_ENV=test
      - HOME=/home/agent
    working_dir: /workspace
    user: agent
    init: true
    stop_timeout: 30
    mem_limit: 1g
    pids_limit: 100
    entrypoint:
      - /workspace/.agents/skills/sandbox-exec/scripts/sandbox/entrypoint.sh
    command: ["bash"]

networks:
  sandbox-net:
    driver: bridge
    internal: true  # No external internet access, internal communication only
