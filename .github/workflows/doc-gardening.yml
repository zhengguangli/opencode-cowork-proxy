name: Doc Gardening
on:
  schedule:
    - cron: '7 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  garden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for stale docs
        run: |
          echo "## Doc Freshness Report" > /tmp/doc-report.md
          echo "" >> /tmp/doc-report.md
          stale=0
          for doc in docs/*.md; do
            if [ -f "$doc" ]; then
              mtime=$(date -r "$doc" +%s)
              now=$(date +%s)
              age=$(( (now - mtime) / 86400 ))
              if [ "$age" -gt 30 ]; then
                echo "- ⚠️ \`$doc\` — $age days since last update" >> /tmp/doc-report.md
                stale=$((stale + 1))
              fi
            fi
          done
          if [ "$stale" -eq 0 ]; then
            echo "- ✅ All docs fresh (<30 days)" >> /tmp/doc-report.md
          fi
          cat /tmp/doc-report.md
