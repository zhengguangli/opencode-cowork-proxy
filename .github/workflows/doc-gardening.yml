name: Doc Gardening
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  garden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Check AGENTS.md freshness
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/context-check.mjs ]; then
            bun .agents/skills/hooks-framework/scripts/context-check.mjs || true
          fi

      - name: Check for stale docs
        run: |
          echo "## Doc Freshness Report" > /tmp/doc-report.md
          echo "" >> /tmp/doc-report.md
          stale=0
          for doc in docs/*.md; do
            if [ -f "$doc" ]; then
              age_days=$(bun -e "
                const fs = require('fs');
                const stat = fs.statSync('$doc');
                const age = Math.floor((Date.now() - stat.mtimeMs) / 86400000);
                console.log(age);
              ")
              if [ "$age_days" -gt 30 ]; then
                echo "- ⚠️ \`$doc\` — $age_days days since last update" >> /tmp/doc-report.md
                stale=$((stale + 1))
              fi
            fi
          done
          if [ $stale -eq 0 ]; then
            echo "- ✅ All docs fresh (<30 days)" >> /tmp/doc-report.md
          fi
          cat /tmp/doc-report.md

      - name: Quality metrics
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/quality-metric.mjs ]; then
            bun .agents/skills/hooks-framework/scripts/quality-metric.mjs || true
          fi
