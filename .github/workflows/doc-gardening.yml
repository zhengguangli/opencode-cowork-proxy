name: Doc Gardening
on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  garden:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check AGENTS.md freshness
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/context-check.mjs ]; then
            node .agents/skills/hooks-framework/scripts/context-check.mjs || true
          fi

      - name: Check for stale docs
        run: |
          echo "## 文档新鲜度报告" > /tmp/doc-report.md
          echo "" >> /tmp/doc-report.md
          stale=0
          for doc in docs/*.md; do
            if [ -f "$doc" ]; then
              age_days=$(node -e "
                const fs = require('fs');
                const stat = fs.statSync('$doc');
                const age = Math.floor((Date.now() - stat.mtimeMs) / 86400000);
                console.log(age);
              ")
              if [ "$age_days" -gt 30 ]; then
                echo "- ⚠️ \`$doc\` — $age_days 天未更新" >> /tmp/doc-report.md
                stale=$((stale + 1))
              fi
            fi
          done
          if [ $stale -eq 0 ]; then
            echo "- ✅ 所有文档新鲜（<30 天）" >> /tmp/doc-report.md
          fi
          cat /tmp/doc-report.md

      - name: Quality metrics
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/quality-metric.mjs ]; then
            node .agents/skills/hooks-framework/scripts/quality-metric.mjs || true
          fi
          if [ -f .harness-pliot/metrics/quality_$(date +%Y%m%d).json ]; then
            echo "### 质量指标" >> /tmp/doc-report.md
            echo '~~~json' >> /tmp/doc-report.md
            cat .harness-pliot/metrics/quality_$(date +%Y%m%d).json >> /tmp/doc-report.md
            echo '~~~' >> /tmp/doc-report.md
          fi
