name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bunx tsc --noEmit

      - name: Run architecture tests
        run: bun test test/architecture.test.ts

      - name: Run full test suite
        run: bun test

      - name: Check file size limits
        run: |
          max_lines=500
          for f in $(find src -name "*.ts" -not -path "*/node_modules/*"); do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt "$max_lines" ]; then
              echo "FAIL: $f has $lines lines (max $max_lines)"
              exit 1
            fi
          done
          echo "All source files under $max_lines lines"

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Dependency audit
        run: bun run scripts/audit-deps.mjs --ci

      - name: Check license
        run: |
          echo "License: $(bun -e "console.log(require('./package.json').license)")"
