name: Release + Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-and-deploy:
    name: Create release + deploy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Deploy to Cloudflare Workers
        if: github.event_name == 'push'
        continue-on-error: true
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}

      - name: Deploy to Vercel
        if: github.event_name == 'push'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_Y9xS2rBnMALnypWNwhRKW3ox
          VERCEL_PROJECT_ID: prj_erSVGhp12ZUKOP0fqWhOZBCNUruX
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Skipping Vercel deploy: VERCEL_TOKEN not set"
            exit 0
          fi
          bunx vercel deploy --prod --token="$VERCEL_TOKEN"

      - name: Create release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: release-${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" \
            --target "$GITHUB_SHA" \
            --title "$TAG_NAME" \
            --notes "Automated release for $GITHUB_SHA"
