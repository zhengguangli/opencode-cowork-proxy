name: Harness Hooks
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  hooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Pre-execution hooks
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/context-check.mjs ]; then
            node .agents/skills/hooks-framework/scripts/context-check.mjs
          fi

      - name: Post-execution hooks
        run: |
          if [ -f .agents/skills/hooks-framework/scripts/lint-check.mjs ]; then
            node .agents/skills/hooks-framework/scripts/lint-check.mjs
          fi

      - name: Upload trace logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: harness-trace
          path: .harness-pliot/
          retention-days: 7
