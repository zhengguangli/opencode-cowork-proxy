name: Entropy GC
on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Scan type'
        required: true
        default: 'quick'
        type: choice
        options:
          - quick
          - full

permissions:
  contents: write
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Determine scan type
        id: scan
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=--${{ github.event.inputs.scan_type }}" >> $GITHUB_OUTPUT
          elif [[ "$(date +%u)" == "1" ]]; then
            echo "mode=--full" >> $GITHUB_OUTPUT
          else
            echo "mode=--quick" >> $GITHUB_OUTPUT
          fi

      - name: Drift scan (placeholder)
        run: |
          echo "Drift scan skipped — CI coverage via bun test"

      - name: Create placeholder report
        if: always()
        run: |
          echo "## Entropy GC Report" > .harness-pilot/entropy-report-$(date +%Y%m%d).md
          echo "" >> .harness-pilot/entropy-report-$(date +%Y%m%d).md
          echo "CI-based drift scan disabled. Coverage via: bun test + bun run typecheck" >> .harness-pilot/entropy-report-$(date +%Y%m%d).md

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: entropy-reports
          path: .harness-pilot/entropy-report-*.md
          retention-days: 30
